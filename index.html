<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>VCC 2026 — VVIP Consulting Conference</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow-x: hidden;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── 진행바 ── */
    #progressBar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, #7B2FFF, #3B82F6, #F5C842);
      z-index: 999;
      transition: width 0.04s linear;
    }

    /* ── 로딩 오버레이 ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 900;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease;
    }
    #loadingOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
    }
    .loading-bar-wrap {
      width: 160px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7B2FFF, #3B82F6, #F5C842);
      transition: width 0.2s ease;
    }

    /* ── 공통 너비: 9:16 기준 ── */
    :root {
      --content-width: min(100vw, calc(100vh * 9 / 16));
    }

    /* ────────────────────────────────────────
       영상 sticky 구조
       - #videoSection : 스크롤 구간 (600vh)
       - #videoSticky  : sticky로 화면 고정
       - 스크롤 끝난 후에도 마지막 프레임 유지
    ──────────────────────────────────────── */
    #videoSection {
      position: relative;
      height: 600vh;
    }

    #videoSticky {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      /* sticky가 끝난 뒤에도 뷰포트에 남도록
         z-index로 상세페이지 위에 올리지 않음 — 자연스럽게 스크롤 */
    }

    /* 영상 래퍼 — 9:16 고정 */
    #videoWrap {
      position: relative;
      width: var(--content-width);
      height: 100vh;
      flex-shrink: 0;
      overflow: hidden;
    }

    #scrollVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: translateZ(0);
      will-change: contents;
    }

    /* ── 텍스트 오버레이 ── */
    .text-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    .scene-text {
      font-family: 'Pretendard', sans-serif;
      font-size: clamp(18px, 4vw, 38px);
      font-weight: 700;
      color: #141253;
      letter-spacing: -0.01em;
      text-align: center;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      position: absolute;
      white-space: nowrap;
      text-shadow:
        0 0 40px rgba(255,255,255,0.7),
        0 0 80px rgba(255,255,255,0.3);
    }
    .scene-text.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .scene-text.fadeout {
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    /* 스크롤 힌트 */
    #scrollHint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: hintBounce 2s ease-in-out infinite;
      transition: opacity 0.4s;
      z-index: 20;
    }
    #scrollHint span {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
    .hint-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.45));
    }
    @keyframes hintBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* ── 섹션 2: 상세페이지 ── */
    #detailSection {
      width: 100%;
      background: #000;
      display: flex;
      justify-content: center;
    }
    #detailSection img {
      width: var(--content-width);
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div id="progressBar"></div>

  <div id="loadingOverlay">
    <p class="loading-logo">VCC 2026</p>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill" id="loadFill"></div>
    </div>
  </div>

  <!-- 영상 섹션 -->
  <section id="videoSection">
    <div id="videoSticky">
      <div id="videoWrap">

        <video
          id="scrollVideo"
          muted
          playsinline
          preload="auto"
          webkit-playsinline
        >
          <source src="main.mp4" type="video/mp4">
        </video>

        <div class="text-overlay">
          <span class="scene-text" id="text1">글로벌 AI 산업</span>
          <span class="scene-text" id="text2">마케팅 트렌드 변화</span>
          <span class="scene-text" id="text3">금융 시장 변화</span>
        </div>

        <div id="scrollHint">
          <span>Scroll</span>
          <div class="hint-line"></div>
        </div>

      </div>
    </div>
  </section>

  <!-- 상세페이지 -->
  <section id="detailSection">
    <img src="detail.png" alt="VCC 상세페이지" loading="lazy">
  </section>

  <script>
    const video   = document.getElementById('scrollVideo');
    const section = document.getElementById('videoSection');
    const bar     = document.getElementById('progressBar');
    const hint    = document.getElementById('scrollHint');
    const overlay = document.getElementById('loadingOverlay');
    const fill    = document.getElementById('loadFill');
    const text1   = document.getElementById('text1');
    const text2   = document.getElementById('text2');
    const text3   = document.getElementById('text3');

    let ticking   = false;
    let lastTime  = -1;
    let isReady   = false;
    let duration  = 0;
    let videoEnded = false; // 마지막 프레임 고정 플래그

    const timings = [
      { el: text1, inStart: 3.5, outStart: 4.1  }, // 글로벌 AI 산업 — 4.1초에 사라지기 시작
      { el: text2, inStart: 4.3, outStart: 4.9  }, // 마케팅 트렌드 변화 — 4.9초에 사라지기 시작
      { el: text3, inStart: 5.1, outStart: 5.7  }, // 금융 시장 변화 — 5.7초에 사라지기 시작
    ];

    function updateTexts(t) {
      timings.forEach(({ el, inStart, outStart }) => {
        if (t >= inStart && t < outStart) {
          el.classList.remove('fadeout');
          el.classList.add('visible');
        } else if (t >= outStart) {
          el.classList.remove('visible');
          el.classList.add('fadeout');
        } else {
          el.classList.remove('visible', 'fadeout');
        }
      });
    }

    video.addEventListener('progress', () => {
      if (video.buffered.length && video.duration) {
        const pct = video.buffered.end(video.buffered.length - 1) / video.duration * 100;
        fill.style.width = Math.min(pct, 100) + '%';
      }
    });

    function onReady() {
      if (isReady) return;
      isReady  = true;
      duration = video.duration;
      fill.style.width = '100%';
      setTimeout(() => overlay.classList.add('hidden'), 300);
      scrub();
    }

    video.addEventListener('canplaythrough', onReady);
    video.addEventListener('loadedmetadata', () => {
      duration = video.duration;
      if (video.readyState >= 4) onReady();
    });
    if (video.readyState >= 4) onReady();

    function scrub() {
      ticking = false;

      const scrollY     = window.scrollY;
      const secTop      = section.offsetTop;
      const scrubHeight = section.offsetHeight - window.innerHeight;

      if (isReady && duration && scrubHeight > 0) {
        const rawProgress = (scrollY - secTop) / scrubHeight;

        // ── 핵심: progress를 1로 클램프하되
        //    스크롤이 섹션을 벗어나도 마지막 프레임 유지
        const progress = Math.max(0, Math.min(rawProgress, 1));
        const targetTime = duration * progress;

        if (Math.abs(targetTime - lastTime) > 0.016) {
          lastTime = targetTime;
          video.currentTime = targetTime;
          updateTexts(targetTime);
        }

        // 스크롤 구간 100% 도달 시 마지막 프레임 고정
        if (progress >= 1 && !videoEnded) {
          videoEnded = true;
          video.currentTime = duration; // 마지막 프레임 명시적 고정
        }

        hint.style.opacity = Math.max(0, 1 - progress * 6);
      }

      const totalH = document.body.scrollHeight - window.innerHeight;
      bar.style.width = totalH > 0 ? (window.scrollY / totalH * 100) + '%' : '0%';
    }

    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(scrub);
        ticking = true;
      }
    }, { passive: true });

    scrub();
  </script>

</body>
</html>
