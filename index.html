<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCC 2026 — VVIP Consulting Conference</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow-x: hidden;
    }

    /* ── 진행바 ── */
    #progressBar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, #7B2FFF, #3B82F6, #F5C842);
      z-index: 999;
      transition: width 0.04s linear;
    }

    /* ── 로딩 오버레이 ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 900;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
    }

    .loading-bar-wrap {
      width: 160px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7B2FFF, #3B82F6, #F5C842);
      transition: width 0.2s ease;
    }

    /* ── 섹션 1: 영상 스크롤 스크러빙 ── */
    #videoSection {
      position: relative;
      height: 600vh;
    }

    #videoSticky {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #scrollVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      /* GPU 가속 강제 적용 */
      transform: translateZ(0);
      will-change: contents;
    }

    /* 스크롤 힌트 */
    #scrollHint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: hintBounce 2s ease-in-out infinite;
      transition: opacity 0.4s;
    }

    #scrollHint span {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }

    .hint-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.4));
    }

    @keyframes hintBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* ── 섹션 2: 상세페이지 이미지 ── */
    #detailSection {
      width: 100%;
      background: #000;
      display: flex;
      justify-content: center;
    }

    #detailSection img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <!-- 진행바 -->
  <div id="progressBar"></div>

  <!-- 로딩 오버레이 -->
  <div id="loadingOverlay">
    <p class="loading-logo">VCC 2026</p>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill" id="loadFill"></div>
    </div>
  </div>

  <!-- ── 섹션 1: 스크롤 영상 ── -->
  <section id="videoSection">
    <div id="videoSticky">
      <video
        id="scrollVideo"
        muted
        playsinline
        preload="auto"
        webkit-playsinline
      >
        <source src="TEST_VCC.mp4" type="video/mp4">
      </video>

      <div id="scrollHint">
        <span>Scroll</span>
        <div class="hint-line"></div>
      </div>
    </div>
  </section>

  <!-- ── 섹션 2: 상세페이지 이미지 ── -->
  <section id="detailSection">
    <img src="detail.png" alt="VCC 상세페이지" loading="lazy">
  </section>

  <script>
    const video   = document.getElementById('scrollVideo');
    const section = document.getElementById('videoSection');
    const bar     = document.getElementById('progressBar');
    const hint    = document.getElementById('scrollHint');
    const overlay = document.getElementById('loadingOverlay');
    const fill    = document.getElementById('loadFill');

    let ticking      = false;
    let lastTime     = -1;
    let isReady      = false;
    let duration     = 0;

    /* ── 영상 버퍼 진행률 표시 ── */
    video.addEventListener('progress', () => {
      if (video.buffered.length > 0 && video.duration) {
        const pct = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
        fill.style.width = Math.min(pct, 100) + '%';
      }
    });

    /* ── 영상 재생 가능 상태 감지 ── */
    function onReady() {
      if (isReady) return;
      isReady  = true;
      duration = video.duration;

      /* 로딩 오버레이 제거 */
      fill.style.width = '100%';
      setTimeout(() => overlay.classList.add('hidden'), 300);

      scrub();
    }

    video.addEventListener('canplaythrough', onReady);
    video.addEventListener('loadedmetadata', () => {
      duration = video.duration;
      /* 이미 충분히 버퍼됐으면 바로 해제 */
      if (video.readyState >= 4) onReady();
    });

    /* readyState 이미 충족된 경우 */
    if (video.readyState >= 4) onReady();

    /* ── 핵심 스크러빙 함수 ── */
    function scrub() {
      ticking = false;

      const scrollY     = window.scrollY;
      const secTop      = section.offsetTop;
      const scrubHeight = section.offsetHeight - window.innerHeight;

      /* 영상 스크러빙 */
      if (isReady && duration && scrubHeight > 0) {
        const scrolled  = Math.max(0, scrollY - secTop);
        const progress  = Math.min(scrolled / scrubHeight, 1);
        const targetTime = duration * progress;

        /* 0.033초(1프레임) 이상 차이날 때만 업데이트 — 불필요한 디코딩 방지 */
        if (Math.abs(targetTime - lastTime) > 0.033) {
          lastTime = targetTime;
          video.currentTime = targetTime;
        }

        /* 스크롤 힌트 페이드 */
        hint.style.opacity = Math.max(0, 1 - progress * 6);
      }

      /* 전체 진행바 */
      const totalH   = document.body.scrollHeight - window.innerHeight;
      const totalPct = totalH > 0 ? (scrollY / totalH) * 100 : 0;
      bar.style.width = totalPct + '%';
    }

    /* ── rAF throttle — 스크롤마다 한 번만 실행 ── */
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(scrub);
        ticking = true;
      }
    }, { passive: true });

    scrub();
  </script>

</body>
</html>
