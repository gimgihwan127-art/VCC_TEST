<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCC 2025 — VVIP Consulting Conference</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow-x: hidden;
    }

    /* ── 진행바 ── */
    #progressBar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, #7B2FFF, #3B82F6, #F5C842);
      z-index: 999;
      transition: width 0.05s linear;
    }

    /* ── 섹션 1: 영상 스크롤 스크러빙 ── */
    #videoSection {
      position: relative;
      height: 600vh;
    }

    #videoSticky {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #scrollVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 스크롤 힌트 */
    #scrollHint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: hintBounce 2s ease-in-out infinite;
      transition: opacity 0.4s;
    }

    #scrollHint span {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }

    .hint-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.4));
    }

    @keyframes hintBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* ── 섹션 2: 상세페이지 이미지 ── */
    #detailSection {
      width: 100%;
      background: #000;
      display: flex;
      justify-content: center;
    }

    #detailSection img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <!-- 진행바 -->
  <div id="progressBar"></div>

  <!-- ── 섹션 1: 스크롤 영상 ── -->
  <section id="videoSection">
    <div id="videoSticky">
      <video
        id="scrollVideo"
        muted
        playsinline
        preload="auto"
      >
        <source src="TEST_VCC.mp4" type="video/mp4">
      </video>

      <div id="scrollHint">
        <span>Scroll</span>
        <div class="hint-line"></div>
      </div>
    </div>
  </section>

  <!-- ── 섹션 2: 상세페이지 이미지 ── -->
  <section id="detailSection">
    <img src="detail.png" alt="VCC 상세페이지">
  </section>

  <script>
    const video    = document.getElementById('scrollVideo');
    const section  = document.getElementById('videoSection');
    const bar      = document.getElementById('progressBar');
    const hint     = document.getElementById('scrollHint');

    function onScroll() {
      const scrollY      = window.scrollY;
      const secTop       = section.offsetTop;
      const scrubHeight  = section.offsetHeight - window.innerHeight;

      /* ── 영상 스크러빙 ── */
      if (video.duration && scrubHeight > 0) {
        const scrolled = Math.max(0, scrollY - secTop);
        const progress = Math.min(scrolled / scrubHeight, 1);
        video.currentTime = video.duration * progress;

        /* 스크롤 힌트 페이드 */
        hint.style.opacity = Math.max(0, 1 - progress * 6);
      }

      /* ── 전체 진행바 ── */
      const totalH   = document.body.scrollHeight - window.innerHeight;
      const totalPct = totalH > 0 ? (scrollY / totalH) * 100 : 0;
      bar.style.width = totalPct + '%';
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    video.addEventListener('loadedmetadata', onScroll);
    onScroll();
  </script>

</body>
</html>
